<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #4f46e5;
            --text: #f8fafc;
            --accent: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h1 { margin: 0 0 0.5rem 0; font-size: 1.8rem; }
        p { color: var(--accent); font-size: 0.9rem; margin-bottom: 2rem; }
        
        .upload-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #64748b; margin-bottom: 0.5rem; }
        
        input[type="file"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 8px;
            color: var(--accent);
            cursor: pointer;
        }
        
        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-top: 1rem;
        }
        button:hover { background: #4338ca; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Data Processor</h1>
        <p>Merge two CSV files into one Excel report.</p>
        <form method="post" action="/process" enctype="multipart/form-data">
            <div class="upload-group">
                <label>First DataFrame</label>
                <input type="file" name="file1" accept=".csv" required>
            </div>
            <div class="upload-group">
                <label>Second DataFrame</label>
                <input type="file" name="file2" accept=".csv" required>
            </div>
            <button type="submit">Process & Save</button>
        </form>
    </div>
</body>
</html>
